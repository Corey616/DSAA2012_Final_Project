name: storygen
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip>=24
  - pip:
      # Core ML
      - torch>=2.4,<3.0
      - torchvision>=0.19,<1.0
      - transformers>=4.44,<6.0
      - diffusers>=0.30,<1.0
      - accelerate>=0.33,<2.0
      - safetensors>=0.4,<1.0
      - peft>=0.12,<1.0

      # HuggingFace ecosystem
      - huggingface-hub>=0.25,<2.0

      # Vision & image processing
      - opencv-python-headless>=4.9
      - pillow>=10.0
      - scipy>=1.11
      - numpy>=1.24,<3.0
      - timm>=0.9,<2.0
      - open-clip-torch>=2.24,<4.0
      - lpips>=0.1

      # Tokenization
      - tokenizers>=0.19,<1.0
      - sentencepiece>=0.2

      # Utilities
      - ftfy>=6.0
      - tqdm>=4.60
      - pyyaml>=6.0
      - requests>=2.31
      - click>=8.0
      - filelock>=3.0
      - psutil>=5.0
      - regex>=2023.0
      - rich>=13.0
      - jinja2>=3.0
      - markupsafe>=2.0

      # Only install nvidia CUDA packages if on linux+x86_64 with CUDA.
      # On other platforms, torch will use CPU (or MPS/ROCm as available).
      - nvidia-cuda-runtime-cu12>=12.4 ; platform_system == "Linux"
